name: publish ios sdk

description: package ios source code, upload the zip to release and publish the podspec file to cocoapods

inputs:
  version:
    required: false
    description: The version of pod.
    type: string
  tag:
    required: false
    type: string
    description: The tag for release.
  component:
    required: false
    type: string
    default: 'all'
  cocoapods_trunk_token:
    description: The secret key of the sdk to publish
    type: string
  github_token:
    description: The github token
    type: string
  source_type:
    required: false
    description: The podspec source type.
    type: string
    default: 'zip'
  git_source_ref:
    required: false
    description: The git ref value used when source_type is git.
    type: string
  git_source_ref_type:
    required: false
    description: The git ref field used when source_type is git.
    type: string

runs:
  using: composite
  steps:
    - name: Prepare cocoapods publish source
      shell: bash
      run: |-
        cd $GITHUB_WORKSPACE/lynx
        source tools/envsetup.sh
        python3 tools/ios_tools/cocoapods_publish_helper.py \
          --prepare-source \
          --tag "${{ inputs.tag }}" \
          --version "${{ inputs.version }}" \
          --component "${{ inputs.component }}" \
          --source-type "${{ inputs.source_type }}" \
          --git-source-url "${{ github.server_url }}/${{ github.repository }}.git" \
          --git-source-ref-type "${{ inputs.git_source_ref_type }}" \
          --git-source-ref "${{ inputs.git_source_ref }}"
    - name: Push iOS SDK to release
      if: ${{ inputs.source_type == 'zip' }}
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ inputs.tag }}
        token: ${{ inputs.github_token }}
        artifacts: '${{ github.workspace }}/lynx/*.zip'
        replacesArtifacts: true
        allowUpdates: true
        body: ''
    - name: Publish to CocoaPods Repo
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ inputs.cocoapods_trunk_token }}
      shell: bash
      run: |-
        cd $GITHUB_WORKSPACE/lynx
        source tools/envsetup.sh
        git config --global user.name "lynx.authors"
        git config --global user.email "lynx.authors@users.noreply.github.com"
        python3 tools/ios_tools/skip_pod_lint.py --source public
        python3 tools/ios_tools/cocoapods_publish_helper.py --publish --component ${{ inputs.component }}
